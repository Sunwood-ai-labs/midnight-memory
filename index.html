<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Midnight Memory Viewer</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <script>
    const target = new URL("./viewer/", window.location.href);
    target.search = window.location.search;
    target.hash = window.location.hash;
    window.location.replace(target);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=./viewer/">
  </noscript>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #fafafa;
      color: #09090b;
      font: 16px/1.6 "Yu Gothic UI", "Hiragino Sans", sans-serif;
    }

    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <p><a href="./viewer/">viewer/</a> へ移動します。</p>
</body>
</html>
