name: Repository CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  python-qa:
    name: Python QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --group dev

      - name: Check Python syntax
        run: uv run python -m compileall scripts tests

      - name: Run unit tests
        run: uv run pytest

      - name: Validate manifest schema
        run: uv run python scripts/validate_manifest.py

  viewer-qa:
    name: Viewer QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install project dependencies
        run: uv sync

      - name: Install viewer test dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Create stub audio for local-only tracks
        run: uv run python scripts/create_stub_audio.py

      - name: Run viewer probes
        run: npm run test:viewer

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
